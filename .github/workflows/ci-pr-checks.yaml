name: CI - PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  # Detect if PR contains code changes (skip expensive checks for docs-only PRs)
  check-code-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_code_changes: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Check for code changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '!docs/**'
              - '!**/*.md'
              - '!LICENSE'
              - '!OWNERS'

  # Python: lint
  python-lint:
    runs-on: ubuntu-latest
    needs: check-code-changes
    if: needs.check-code-changes.outputs.has_code_changes == 'true'
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  # Container: build (no push) to validate all service Dockerfiles
  container-build:
    runs-on: ubuntu-latest
    needs: check-code-changes
    if: needs.check-code-changes.outputs.has_code_changes == 'true'
    strategy:
      matrix:
        service:
          - name: prediction
            dockerfile: Dockerfile-prediction
          - name: training
            dockerfile: Dockerfile-training
          - name: test
            dockerfile: Dockerfile-test
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.service.name }} container (no push)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f ${{ matrix.service.dockerfile }} \
            --tag test-build-${{ matrix.service.name }}:pr-${{ github.event.pull_request.number }} \
            .
